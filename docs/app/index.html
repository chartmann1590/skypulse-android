<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>SkyPulse — Live Aircraft Tracker</title>
  <meta name="description" content="Live aircraft tracking with ADS-B data, airports, and flight alerts. No account required."/>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#05070A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SkyPulse"/>
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png"/>
  <link rel="icon" type="image/png" href="./icons/icon-192.png"/>

  <!-- Tailwind CDN + config (copied exactly from Stitch home_live_map design) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-secondary-fixed-variant": "#002ccd",
            "on-tertiary-fixed": "#221b00",
            "on-secondary": "#001d93",
            "surface-dim": "#0e131e",
            "surface-container-highest": "#303541",
            "on-error-container": "#ffdad6",
            "surface-container": "#1b1f2b",
            "text-high": "#FFFFFF",
            "on-secondary-container": "#b1bbff",
            "primary-fixed-dim": "#00dbe7",
            "primary-container": "#00f2ff",
            "on-primary-fixed": "#002022",
            "alert-red": "#FF3D00",
            "error-container": "#93000a",
            "on-tertiary-fixed-variant": "#554500",
            "surface-container-high": "#252a36",
            "error": "#ffb4ab",
            "background": "#0e131e",
            "secondary": "#bbc3ff",
            "surface-container-low": "#171b27",
            "primary": "#e1fdff",
            "surface-variant": "#303541",
            "tertiary": "#fff6e4",
            "tertiary-fixed": "#ffe173",
            "on-tertiary": "#3b2f00",
            "on-primary": "#00363a",
            "on-surface-variant": "#b9cacb",
            "glass-surface": "rgba(20, 66, 114, 0.15)",
            "text-med": "#BFBFBF",
            "on-surface": "#dee2f2",
            "surface-bright": "#343946",
            "surface": "#0e131e",
            "outline": "#849495",
            "glass-stroke": "rgba(255, 255, 255, 0.1)",
            "on-background": "#dee2f2",
            "surface-tint": "#00dbe7",
            "on-primary-fixed-variant": "#004f54",
            "outline-variant": "#3a494b",
            "surface-container-lowest": "#090e19",
            "inverse-surface": "#dee2f2",
            "inverse-primary": "#00696f",
            "inverse-on-surface": "#2b303c",
            "on-secondary-fixed": "#000f5d",
            "tertiary-container": "#fed83a",
            "on-tertiary-container": "#725e00",
            "tertiary-fixed-dim": "#e8c423",
            "on-primary-container": "#006a71",
            "primary-fixed": "#74f5ff",
            "pitch-black": "#05070A",
            "secondary-fixed": "#dee0ff",
            "secondary-fixed-dim": "#bbc3ff",
            "secondary-container": "#0231de",
            "on-error": "#690005"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "gutter": "16px",
            "card-padding": "20px",
            "base": "8px",
            "margin-desktop": "32px",
            "margin-mobile": "16px"
          },
          "fontFamily": {
            "title-md": ["Inter"],
            "body-md": ["Inter"],
            "data-lg": ["JetBrains Mono"],
            "headline-lg-mobile": ["Sora"],
            "display-lg": ["Sora"],
            "headline-lg": ["Sora"],
            "label-sm": ["JetBrains Mono"]
          },
          "fontSize": {
            "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "data-lg": ["18px", { "lineHeight": "24px", "fontWeight": "500" }],
            "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
            "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
            "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "400" }]
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="./css/app.css"/>

  <style>
    body { min-height: max(600px, 100dvh); }
    /* Ensure map fills its container */
    #map-container .leaflet-container { width: 100%; height: 100%; }
  </style>
</head>

<body class="h-screen w-screen overflow-hidden bg-pitch-black text-on-surface relative font-body-md text-body-md">

  <!-- Ambient gradient background -->
  <div class="fixed inset-0 pointer-events-none z-0"
       style="background: radial-gradient(60% 50% at 70% 0%, rgba(0,219,231,0.06), transparent 60%),
                          radial-gradient(50% 40% at 10% 30%, rgba(2,49,222,0.05), transparent 60%)">
  </div>

  <!-- ── Email verification banner ── -->
  <div id="verify-banner"
       class="hidden fixed top-0 inset-x-0 z-[100] bg-tertiary-container/90 backdrop-blur text-on-tertiary-container text-sm px-4 py-2 flex items-center justify-between">
    <span>Please verify your email address.
      <button id="resend-verify" class="underline font-semibold">Resend</button>
    </span>
    <button id="dismiss-banner" class="ml-4 text-on-tertiary-container/70 hover:text-on-tertiary-container">✕</button>
  </div>

  <!-- ── Desktop header ── -->
  <header id="app-header"
          class="hidden md:flex bg-glass-surface backdrop-blur-xl border-b border-glass-stroke fixed top-0 w-full z-50 justify-between items-center px-margin-desktop h-16">
    <div class="flex items-center gap-4">
      <button id="settings-btn"
              class="text-primary hover:bg-primary/10 transition-colors p-2 rounded-full">
        <span class="material-symbols-outlined text-2xl">menu</span>
      </button>
      <h1 class="font-display-lg text-headline-lg text-primary tracking-tight font-bold">SkyPulse</h1>
    </div>
    <nav id="desktop-nav" class="flex gap-8">
      <!-- Populated by app.js -->
    </nav>
    <div class="flex items-center gap-3">
      <span id="status-indicator" class="font-label-sm text-label-sm text-on-surface-variant/60 hidden md:block"></span>
      <button id="auth-btn"
              class="w-8 h-8 rounded-full bg-surface-variant border border-glass-stroke flex items-center justify-center overflow-hidden hover:ring-1 hover:ring-primary/50 transition-all">
        <span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
      </button>
    </div>
  </header>

  <!-- ── Mobile header ── -->
  <header class="md:hidden fixed top-0 inset-x-0 z-50 flex items-center justify-between px-4 py-3 bg-pitch-black/80 backdrop-blur-sm">
    <span class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold tracking-tight">SkyPulse</span>
    <div class="flex items-center gap-2">
      <button id="settings-btn-mobile"
              class="w-8 h-8 rounded-full hud-panel flex items-center justify-center">
        <span class="material-symbols-outlined text-on-surface-variant text-sm">settings</span>
      </button>
      <button id="auth-btn-mobile"
              class="w-8 h-8 rounded-full bg-surface-variant border border-glass-stroke flex items-center justify-center overflow-hidden">
        <span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
      </button>
    </div>
  </header>

  <!-- ── Main content area ── -->
  <main class="fixed inset-0 pt-12 md:pt-16 pb-20 md:pb-0">

    <!-- ═══ MAP TAB ═══ -->
    <section id="tab-map" class="tab-panel h-full relative">
      <!-- Leaflet map fills the section -->
      <div id="map-container" class="absolute inset-0"></div>

      <!-- Floating search bar -->
      <div class="absolute top-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-full md:max-w-2xl z-40">
        <div class="hud-panel rounded-full flex items-center px-4 py-3 shadow-lg gap-3">
          <span class="material-symbols-outlined text-on-surface-variant">search</span>
          <input id="map-search"
                 class="bg-transparent border-none text-on-surface focus:ring-0 w-full font-body-md text-body-md placeholder:text-on-surface-variant/50 outline-none"
                 placeholder="Search callsign, aircraft..."
                 type="text"/>
        </div>
      </div>

      <!-- FABs -->
      <div class="absolute right-4 bottom-40 md:bottom-32 flex flex-col gap-3 z-40">
        <button id="my-location-btn"
                class="w-12 h-12 rounded-full hud-panel flex items-center justify-center text-primary hover:bg-primary/10 transition-colors active:scale-95 shadow-lg">
          <span class="material-symbols-outlined">my_location</span>
        </button>
      </div>

      <!-- Bottom info card -->
      <div id="map-info-card" class="absolute bottom-4 left-4 right-4 md:left-8 md:right-auto md:w-96 z-40">
        <div class="hud-panel rounded-xl p-4 flex flex-col gap-3">
          <div class="flex justify-between items-center border-b border-glass-stroke pb-2">
            <h2 class="font-title-md text-title-md text-on-surface">Aircraft Nearby</h2>
            <span id="aircraft-count" class="font-data-lg text-data-lg text-primary">— planes</span>
          </div>
          <div id="closest-aircraft-card"
               class="hidden bg-surface-container-low rounded-lg p-3 border border-outline-variant flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors">
          </div>
          <div class="text-right">
            <span id="last-update-label"
                  class="font-label-sm text-label-sm text-on-surface-variant/70 italic flex items-center justify-end gap-1">
              <span class="w-1.5 h-1.5 rounded-full bg-on-surface-variant/30"></span>
              Waiting for location...
            </span>
          </div>
        </div>
      </div>
    </section>

    <!-- ═══ NEARBY TAB ═══ -->
    <section id="tab-nearby" class="tab-panel h-full overflow-y-auto hidden">
      <div class="px-4 py-4 md:px-8 max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
            Nearby Aircraft
            <span id="nearby-count" class="text-primary/70 text-title-md font-title-md ml-2"></span>
          </h2>
        </div>
        <!-- Sort chips -->
        <div class="flex gap-2 mb-4 overflow-x-auto pb-1 no-scrollbar" id="sort-chips">
          <button class="sort-chip active px-4 py-2 rounded-full font-label-sm text-label-sm border" data-sort="closest">Closest</button>
          <button class="sort-chip px-4 py-2 rounded-full font-label-sm text-label-sm border border-glass-stroke text-on-surface-variant" data-sort="highest">Highest</button>
          <button class="sort-chip px-4 py-2 rounded-full font-label-sm text-label-sm border border-glass-stroke text-on-surface-variant" data-sort="fastest">Fastest</button>
          <button class="sort-chip px-4 py-2 rounded-full font-label-sm text-label-sm border border-glass-stroke text-on-surface-variant" data-sort="recent">Recent</button>
        </div>
        <!-- List -->
        <div id="nearby-list" class="flex flex-col gap-3">
          <p class="text-on-surface-variant text-body-md text-center py-8">Waiting for aircraft data...</p>
        </div>
      </div>
    </section>

    <!-- ═══ AIRPORTS TAB ═══ -->
    <section id="tab-airports" class="tab-panel h-full overflow-y-auto hidden">
      <div class="px-4 py-4 md:px-8 max-w-2xl mx-auto" id="airports-container">
        <!-- Rendered by airports.js -->
      </div>
    </section>

    <!-- ═══ ALERTS TAB ═══ -->
    <section id="tab-alerts" class="tab-panel h-full overflow-y-auto hidden">
      <div class="px-4 py-4 md:px-8 max-w-2xl mx-auto" id="alerts-container">
        <!-- Rendered by alerts.js -->
      </div>
    </section>

    <!-- ═══ SAVED TAB ═══ -->
    <section id="tab-saved" class="tab-panel h-full overflow-y-auto hidden">
      <div class="px-4 py-4 md:px-8 max-w-2xl mx-auto" id="saved-container">
        <!-- Rendered by saved.js -->
      </div>
    </section>

  </main>

  <!-- ── Aircraft Detail Bottom Sheet ── -->
  <div id="detail-sheet"
       class="hidden fixed inset-x-0 bottom-0 z-[60] md:bottom-8 md:left-8 md:right-auto md:w-[400px] md:rounded-2xl overflow-hidden">
    <!-- Content rendered by app.js -->
  </div>

  <!-- ── Settings Panel (slide from left) ── -->
  <div id="settings-panel"
       class="hidden fixed inset-y-0 left-0 z-[70] w-80 bg-surface-container-low border-r border-glass-stroke shadow-2xl overflow-y-auto transition-transform">
    <div id="settings-container" class="p-6">
      <!-- Rendered by settings.js -->
    </div>
  </div>
  <div id="settings-overlay"
       class="hidden fixed inset-0 z-[65] bg-pitch-black/50 backdrop-blur-sm"></div>

  <!-- ── Auth Modal ── -->
  <div id="auth-modal" class="hidden fixed inset-0 z-[80] flex items-end md:items-center justify-center">
    <div class="absolute inset-0 bg-pitch-black/60 backdrop-blur-sm" id="auth-modal-overlay"></div>
    <div id="auth-modal-content"
         class="relative w-full max-w-md bg-surface-container rounded-t-3xl md:rounded-3xl p-6 shadow-2xl border border-glass-stroke z-10 max-h-[90vh] overflow-y-auto">
      <!-- Rendered by auth.js -->
    </div>
  </div>

  <!-- ── Mobile Bottom Nav ── -->
  <nav id="bottom-nav"
       class="md:hidden fixed bottom-0 inset-x-0 z-50 bg-glass-surface backdrop-blur-xl border-t border-glass-stroke flex justify-around items-center px-4 pt-2 rounded-t-xl safe-bottom"
       style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));">
    <button class="tab-btn flex flex-col items-center gap-0.5 text-primary" data-tab="map">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">map</span>
      <span class="font-label-sm text-label-sm">Map</span>
    </button>
    <button class="tab-btn flex flex-col items-center gap-0.5 text-on-surface-variant" data-tab="nearby">
      <span class="material-symbols-outlined text-2xl">explore</span>
      <span class="font-label-sm text-label-sm">Nearby</span>
    </button>
    <button class="tab-btn flex flex-col items-center gap-0.5 text-on-surface-variant" data-tab="airports">
      <span class="material-symbols-outlined text-2xl">local_airport</span>
      <span class="font-label-sm text-label-sm">Airports</span>
    </button>
    <button class="tab-btn flex flex-col items-center gap-0.5 text-on-surface-variant" data-tab="alerts">
      <span class="material-symbols-outlined text-2xl">notifications</span>
      <span class="font-label-sm text-label-sm">Alerts</span>
    </button>
    <button class="tab-btn flex flex-col items-center gap-0.5 text-on-surface-variant" data-tab="saved">
      <span class="material-symbols-outlined text-2xl">bookmark</span>
      <span class="font-label-sm text-label-sm">Saved</span>
    </button>
  </nav>

  <script type="module" src="./js/app.js?v=2"></script>
</body>
</html>
