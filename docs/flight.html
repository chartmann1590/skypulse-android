<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shared flight · SkyPulse</title>
<meta name="description" content="A live flight shared from SkyPulse — see its current position on the map, route and details, and open it in the app." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --pitch:#05070A; --bg:#0E131E; --surface:#171B27; --surface2:#1B1F2B;
    --cyan:#00DBE7; --cyan-bright:#00F2FF; --on:#DEE2F2; --muted:#B9CACB;
    --stroke:rgba(255,255,255,.10); --glass:rgba(20,66,114,.15); --red:#FF3D00;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--pitch);color:var(--on);font-family:Inter,system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
  a{color:var(--cyan);text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px}
  .glow{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(60% 50% at 70% 0%, rgba(0,219,231,.12), transparent 60%),
               radial-gradient(50% 40% at 10% 30%, rgba(2,49,222,.10), transparent 60%)}
  header,main,footer{position:relative;z-index:1}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0}
  .brand{font-family:Sora;font-weight:700;font-size:22px;color:var(--cyan);letter-spacing:-.01em}
  .brand a{color:var(--cyan)}
  .nav-links a{margin-left:20px;color:var(--muted);font-size:14px}
  .nav-links a:hover{color:var(--cyan)}
  .pill{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:12px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--cyan);background:var(--surface);border:1px solid var(--stroke);
    border-radius:999px;padding:6px 14px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--stroke);
    border-radius:24px;padding:24px;margin-top:20px}
  h1{font-family:Sora;font-weight:700;font-size:34px;line-height:1.12;letter-spacing:-.02em;margin:14px 0 4px}
  .callsign{font-family:'JetBrains Mono';color:var(--muted);font-size:15px}
  .route{display:flex;align-items:center;gap:14px;margin-top:18px;flex-wrap:wrap}
  .ap{flex:1;min-width:120px}
  .ap .code{font-family:Sora;font-size:26px;color:var(--on)}
  .ap .city{color:var(--muted);font-size:14px}
  .ap.dest{text-align:right}
  .arrow{color:var(--cyan);font-size:22px}
  .progress{height:6px;border-radius:999px;background:var(--surface2);margin:16px 0 4px;overflow:hidden}
  .progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-bright));border-radius:999px}
  .prog-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);font-family:'JetBrains Mono'}
  #map{height:320px;border-radius:20px;margin-top:20px;border:1px solid var(--stroke);background:var(--bg);z-index:1}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
  .stat{background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:14px}
  .stat .k{font-family:'JetBrains Mono';font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--cyan)}
  .stat .v{font-family:Sora;font-size:20px;margin-top:4px}
  .stat .v small{font-size:12px;color:var(--muted);font-weight:400}
  .cta{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap}
  .btn{border-radius:999px;padding:14px 24px;font-weight:600;font-size:15px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none}
  .btn-primary{background:var(--cyan);color:#00363A;box-shadow:0 4px 24px rgba(0,219,231,.25)}
  .btn-ghost{border:1px solid var(--stroke);color:var(--on);background:var(--surface)}
  .note{color:var(--muted);font-size:13px;margin-top:14px}
  .center{text-align:center}
  .spinner{width:40px;height:40px;border:3px solid var(--stroke);border-top-color:var(--cyan);border-radius:50%;
    margin:32px auto;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  footer{padding:36px 0;color:var(--muted);font-size:13px;border-top:1px solid var(--stroke);margin-top:32px}
  .leaflet-container{background:var(--bg)}
  @media(max-width:560px){h1{font-size:28px}.stats{grid-template-columns:1fr 1fr}.nav-links{display:none}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <header>
    <nav>
      <div class="brand"><a href="index.html">SkyPulse</a></div>
      <div class="nav-links">
        <a href="index.html#features">Features</a>
        <a href="https://github.com/chartmann1590/skypulse-android/releases">Download</a>
        <a href="https://github.com/chartmann1590/skypulse-android">GitHub</a>
      </div>
    </nav>
  </header>

  <main>
    <div id="content">
      <div class="card center"><div class="spinner"></div><p class="note">Loading shared flight…</p></div>
    </div>
  </main>

  <footer>
    <strong style="color:var(--on)">SkyPulse</strong> · Live aircraft tracker · built with free, open data.
    Aircraft © ADSB.lol &amp; OpenSky · routes © adsbdb · tiles © OpenStreetMap contributors.
    <br /><br />
    <a href="index.html">Home</a> ·
    <a href="privacy.html">Privacy</a> ·
    <a href="https://github.com/chartmann1590/skypulse-android/releases">Download the app</a>
  </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  const PROJECT_ID = "skypulse-tracker-2026";
  const API_KEY = "AIzaSyDAE1ILKJgqQ-xBlhG1axCxhRhuqEuwYcc";
  const RELEASES = "https://github.com/chartmann1590/skypulse-android/releases";

  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  const content = document.getElementById("content");

  if (!id) {
    renderError("No flight id in this link.");
    return;
  }

  const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/shared_flights/${encodeURIComponent(id)}?key=${API_KEY}`;

  fetch(url)
    .then((r) => {
      if (r.status === 404) throw new Error("notfound");
      if (!r.ok) throw new Error("http " + r.status);
      return r.json();
    })
    .then((doc) => renderFlight(parseDoc(doc.fields || {})))
    .catch((err) => {
      if (String(err.message) === "notfound") {
        renderError("This shared flight couldn't be found. The link may be incorrect or the flight is no longer available.");
      } else {
        renderError("Couldn't load this flight. Please check your connection and try again.");
      }
    });

  // ---- Firestore REST value parsing ----
  function parseDoc(fields) {
    const out = {};
    for (const k in fields) out[k] = parseValue(fields[k]);
    return out;
  }
  function parseValue(v) {
    if (v == null) return null;
    if ("doubleValue" in v) return Number(v.doubleValue);
    if ("integerValue" in v) return Number(v.integerValue);
    if ("stringValue" in v) return v.stringValue;
    if ("booleanValue" in v) return v.booleanValue;
    if ("timestampValue" in v) return v.timestampValue;
    if ("nullValue" in v) return null;
    return null;
  }

  // ---- Formatting helpers ----
  function fmtInt(n) { return n == null ? "—" : Math.round(n).toLocaleString(); }
  function relTime(epochSec) {
    if (epochSec == null) return "";
    const diff = Math.floor(Date.now() / 1000) - epochSec;
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return Math.floor(diff / 86400) + "d ago";
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function vrLabel(vr) {
    if (vr == null || Math.abs(vr) < 1) return "Level";
    return vr > 0 ? "Climbing" : "Descending";
  }

  function renderError(msg) {
    content.innerHTML =
      '<div class="card center">' +
      '<span class="pill"><span class="dot" style="background:var(--red);box-shadow:0 0 10px var(--red)"></span> Unavailable</span>' +
      '<h1 style="font-size:24px;margin-top:16px">' + esc(msg) + '</h1>' +
      '<div class="cta center" style="justify-content:center">' +
      '<a class="btn btn-primary" href="' + RELEASES + '">⬇ Get SkyPulse</a>' +
      '<a class="btn btn-ghost" href="index.html">Back to home</a>' +
      '</div></div>';
  }

  function renderFlight(d) {
    const title = (d.displayName && d.displayName.trim()) ||
                  (d.callsign && d.callsign.trim()) || "Unknown flight";
    const hasRoute = d.originCode || d.destCode;
    const appLink = "skypulse://flight?id=" + encodeURIComponent(id);

    let routeHtml = "";
    if (hasRoute) {
      const frac = Math.max(0, Math.min(1, d.fractionComplete || 0));
      const eta = d.etaMinutes != null
        ? (d.etaMinutes >= 60 ? Math.floor(d.etaMinutes / 60) + "h " + (d.etaMinutes % 60) + "m" : d.etaMinutes + "m")
        : null;
      routeHtml =
        '<div class="route">' +
          '<div class="ap"><div class="code">' + esc(d.originCode || "—") + '</div>' +
            '<div class="city">' + esc(d.originCity || d.originName || "") + '</div></div>' +
          '<div class="arrow">✈</div>' +
          '<div class="ap dest"><div class="code">' + esc(d.destCode || "—") + '</div>' +
            '<div class="city">' + esc(d.destCity || d.destName || "") + '</div></div>' +
        '</div>' +
        '<div class="progress"><span style="width:' + (frac * 100).toFixed(0) + '%"></span></div>' +
        '<div class="prog-meta"><span>' + (frac * 100).toFixed(0) + '% complete</span>' +
          '<span>' + (d.remainingNm != null ? fmtInt(d.remainingNm) + " nm left" : "") +
            (eta ? " · " + eta : "") + '</span></div>';
    }

    const onGround = d.onGround === true;
    const stats =
      '<div class="stats">' +
        stat("Altitude", onGround ? "Ground" : fmtInt(d.altitudeFeet), onGround ? "" : "ft") +
        stat("Speed", fmtInt(d.speedKnots), "kt") +
        stat("Heading", d.headingDegrees != null ? fmtInt(d.headingDegrees) + "°" : "—", "") +
        stat("Vertical", vrLabel(d.verticalRate), d.verticalRate != null ? fmtInt(Math.abs(d.verticalRate)) + " fpm" : "") +
        stat("Type", d.typeCode || "—", "") +
        stat("Registry", d.hex ? d.hex.toUpperCase() : "—", "") +
      '</div>';

    const airline = d.airlineName ? '<div class="callsign">' + esc(d.airlineName) + '</div>' : "";
    const seen = d.lastSeenEpochSeconds ? ' · seen ' + relTime(d.lastSeenEpochSeconds) : "";

    content.innerHTML =
      '<div class="card">' +
        '<span class="pill"><span class="dot"></span> Shared live flight' + esc(seen) + '</span>' +
        '<h1>' + esc(title) + '</h1>' +
        airline +
        (d.originCountry ? '<div class="callsign">Origin country · ' + esc(d.originCountry) + '</div>' : "") +
        routeHtml +
        '<div id="map"></div>' +
        stats +
        '<div class="cta">' +
          '<a class="btn btn-primary" id="openApp" href="' + appLink + '">📲 Open in SkyPulse</a>' +
          '<a class="btn btn-ghost" href="' + RELEASES + '">⬇ Get the app</a>' +
        '</div>' +
        '<p class="note">Don\'t have SkyPulse yet? Install it, then tap “Open in SkyPulse” to see this flight live on your own map. ' +
          'Positions are a snapshot from when the flight was shared.</p>' +
      '</div>';

    initMap(d);
  }

  function stat(k, v, unit) {
    return '<div class="stat"><div class="k">' + esc(k) + '</div>' +
      '<div class="v">' + esc(v) + (unit ? ' <small>' + esc(unit) + '</small>' : "") + '</div></div>';
  }

  function planeIcon(heading) {
    const rot = (heading || 0);
    const html = '<div style="transform:rotate(' + rot + 'deg);font-size:26px;line-height:1;' +
      'filter:drop-shadow(0 0 6px rgba(0,219,231,.8))">✈</div>';
    return L.divIcon({ html: html, className: "", iconSize: [26, 26], iconAnchor: [13, 13] });
  }

  function initMap(d) {
    if (d.lat == null || d.lon == null) {
      document.getElementById("map").style.display = "none";
      return;
    }
    const map = L.map("map", { zoomControl: true, attributionControl: true })
      .setView([d.lat, d.lon], 7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "© OpenStreetMap contributors",
    }).addTo(map);

    const planeMarker = L.marker([d.lat, d.lon], { icon: planeIcon(d.headingDegrees) }).addTo(map);
    planeMarker.bindPopup("Current position");

    const bounds = [[d.lat, d.lon]];
    if (d.originLat != null && d.originLon != null && (d.originLat || d.originLon)) {
      L.circleMarker([d.originLat, d.originLon], { radius: 6, color: "#B9CACB", fillColor: "#B9CACB", fillOpacity: 1 })
        .addTo(map).bindPopup("Origin · " + (d.originCode || ""));
      bounds.push([d.originLat, d.originLon]);
    }
    if (d.destLat != null && d.destLon != null && (d.destLat || d.destLon)) {
      L.circleMarker([d.destLat, d.destLon], { radius: 6, color: "#00DBE7", fillColor: "#00DBE7", fillOpacity: 1 })
        .addTo(map).bindPopup("Destination · " + (d.destCode || ""));
      bounds.push([d.destLat, d.destLon]);
    }
    if (bounds.length > 1) {
      L.polyline(bounds, { color: "#00DBE7", weight: 2, opacity: 0.5, dashArray: "6 8" }).addTo(map);
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  }
})();
</script>
</body>
</html>
