version: 2
updates:
  # Gradle dependencies (version catalog + build files).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    # Group related updates so they arrive as a few PRs instead of many.
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin-ksp:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
      firebase-gms:
        patterns:
          - "com.google.firebase*"
          - "com.google.android.gms*"
          - "com.google.gms*"
      hilt:
        patterns:
          - "com.google.dagger*"
    ignore:
      # CodeQL only supports Kotlin < 2.3.30; pin to 2.3.x until CodeQL adds 2.4+ support.
      - dependency-name: "org.jetbrains.kotlin*"
        versions: [">= 2.4.0"]

  # GitHub Actions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
