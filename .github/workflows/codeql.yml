name: CodeQL

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "23 5 * * 1"   # weekly, Mondays 05:23 UTC

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          value = os.environ["GOOGLE_SERVICES_JSON"].strip()
          if value.startswith("{"):
              config = value
          else:
              config = base64.b64decode(value).decode("utf-8")
          json.loads(config)
          Path("app/google-services.json").write_text(config)
          PY
          else
            cp app/google-services.json.template app/google-services.json
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: .github/codeql-config.yml
          queries: security-and-quality

      - name: Build project (traced by CodeQL)
        run: ./gradlew clean :app:assembleDebug --no-daemon --no-build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
