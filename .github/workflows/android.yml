name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  # Gate: unit tests + a debug build (uses AdMob *test* IDs) before the signed release.
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload Lint SARIF to code scanning
    env:
      GH_API_TOKEN: stub_token
      GH_REPO_OWNER: stub_owner
      GH_REPO_NAME: stub_name

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Write google-services.json from secret
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Validate Firebase auth config
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("app/google-services.json").read_text())
          oauth_clients = config["client"][0].get("oauth_client", [])
          assert any(client.get("client_type") == 1 for client in oauth_clients), "missing Android OAuth client"
          assert any(client.get("client_type") == 3 for client in oauth_clients), "missing web OAuth client"
          PY

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: skypulse-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload Lint results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint

  # Runs only on pushes to main: bump versionCode, build a SIGNED release APK + AAB with the
  # real AdMob IDs (from secrets), and publish a GitHub Release.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Bump versionCode and commit
        id: ver
        run: |
          # Ignore file-mode changes (e.g. gradlew +x) so only the versionCode bump is committed
          # and the working tree stays clean for rebasing.
          git config core.fileMode false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT=$(grep -oP 'versionCode = \K[0-9]+' app/build.gradle.kts)
          NEXT=$((CURRENT + 1))
          sed -i "s/versionCode = ${CURRENT}/versionCode = ${NEXT}/" app/build.gradle.kts
          NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "code=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          git commit -m "chore: bump versionCode to ${NEXT} [skip ci]" app/build.gradle.kts
          # Tolerate concurrent pushes to main by rebasing and retrying.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push rejected (attempt ${attempt}); rebasing onto latest main..."
            git pull --rebase origin main
            sleep $((RANDOM % 4 + 2))
          done
          echo "Failed to push versionCode bump after 5 attempts" >&2
          exit 1

      - name: Write local.properties from secrets (enables real ads and feedback)
        run: |
          cat > local.properties <<EOF
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID=${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID=${{ secrets.ADMOB_REWARDED_ID }}
          KEYSTORE_FILE=keystore.jks
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          github.api.token=${{ secrets.GH_API_TOKEN }}
          github.repo.owner=${{ secrets.GH_REPO_OWNER }}
          github.repo.name=${{ secrets.GH_REPO_NAME }}
          EOF

      - name: Decode release keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Write google-services.json from secret
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Validate Firebase auth config
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("app/google-services.json").read_text())
          oauth_clients = config["client"][0].get("oauth_client", [])
          assert any(client.get("client_type") == 1 for client in oauth_clients), "missing Android OAuth client"
          assert any(client.get("client_type") == 3 for client in oauth_clients), "missing web OAuth client"
          PY

      - name: Build signed release APK and AAB
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: skypulse-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.name }}+${{ steps.ver.outputs.code }}
          name: SkyPulse v${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Clean up secrets
        if: always()
        run: rm -f keystore.jks local.properties app/google-services.json
