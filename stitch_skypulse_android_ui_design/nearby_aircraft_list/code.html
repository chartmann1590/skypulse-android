<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SkyPulse - Nearby Aircraft</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Inter:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#002ccd",
                    "on-tertiary-fixed": "#221b00",
                    "on-secondary": "#001d93",
                    "surface-dim": "#0e131e",
                    "surface-container-highest": "#303541",
                    "on-error-container": "#ffdad6",
                    "surface-container": "#1b1f2b",
                    "text-high": "#FFFFFF",
                    "on-secondary-container": "#b1bbff",
                    "primary-fixed-dim": "#00dbe7",
                    "primary-container": "#00f2ff",
                    "on-primary-fixed": "#002022",
                    "alert-red": "#FF3D00",
                    "error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#554500",
                    "surface-container-high": "#252a36",
                    "error": "#ffb4ab",
                    "background": "#0e131e",
                    "secondary": "#bbc3ff",
                    "surface-container-low": "#171b27",
                    "primary": "#e1fdff",
                    "surface-variant": "#303541",
                    "tertiary": "#fff6e4",
                    "tertiary-fixed": "#ffe173",
                    "on-tertiary": "#3b2f00",
                    "on-primary": "#00363a",
                    "on-surface-variant": "#b9cacb",
                    "glass-surface": "rgba(20, 66, 114, 0.15)",
                    "text-med": "#BFBFBF",
                    "on-surface": "#dee2f2",
                    "surface-bright": "#343946",
                    "surface": "#0e131e",
                    "outline": "#849495",
                    "glass-stroke": "rgba(255, 255, 255, 0.1)",
                    "on-background": "#dee2f2",
                    "surface-tint": "#00dbe7",
                    "on-primary-fixed-variant": "#004f54",
                    "outline-variant": "#3a494b",
                    "surface-container-lowest": "#090e19",
                    "inverse-surface": "#dee2f2",
                    "inverse-primary": "#00696f",
                    "inverse-on-surface": "#2b303c",
                    "on-secondary-fixed": "#000f5d",
                    "tertiary-container": "#fed83a",
                    "on-tertiary-container": "#725e00",
                    "tertiary-fixed-dim": "#e8c423",
                    "on-primary-container": "#006a71",
                    "primary-fixed": "#74f5ff",
                    "pitch-black": "#05070A",
                    "secondary-fixed": "#dee0ff",
                    "secondary-fixed-dim": "#bbc3ff",
                    "secondary-container": "#0231de",
                    "on-error": "#690005"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "card-padding": "20px",
                    "base": "8px",
                    "margin-desktop": "32px",
                    "margin-mobile": "16px"
            },
            "fontFamily": {
                    "title-md": ["Inter"],
                    "body-md": ["Inter"],
                    "data-lg": ["JetBrains Mono"],
                    "headline-lg-mobile": ["Sora"],
                    "display-lg": ["Sora"],
                    "headline-lg": ["Sora"],
                    "label-sm": ["JetBrains Mono"]
            },
            "fontSize": {
                    "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "data-lg": ["18px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body { background-color: #05070A; }
        .hud-glow { box-shadow: 0 4px 20px rgba(225, 253, 255, 0.1); }
        .glass-card { background: rgba(20, 66, 114, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% -20%, rgba(0, 219, 231, 0.15) 0%, rgba(5, 7, 10, 1) 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* Radar Animation for Empty State */
        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-sweep {
            animation: radar-spin 4s linear infinite;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 219, 231, 0.4) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased pb-24 pt-16 selection:bg-primary selection:text-on-primary min-h-screen">
<div class="ambient-bg"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-glass-surface backdrop-blur-xl border-b border-glass-stroke transition-transform active:scale-95">
<button aria-label="Menu" class="text-primary hover:bg-primary/10 transition-colors rounded-full p-2">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-display-lg text-primary tracking-tight">SkyPulse</h1>
<button aria-label="Profile" class="text-primary hover:bg-primary/10 transition-colors rounded-full p-1">
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-glass-stroke overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
</button>
</header>
<main class="px-margin-mobile max-w-3xl mx-auto mt-6 space-y-6">
<!-- Screen Header & Sort Chips -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Nearby Aircraft <span class="text-primary/70 text-title-md font-title-md ml-2">(14)</span></h2>
<button aria-label="Filter" class="glass-card rounded-full p-2 text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="tune">tune</span>
</button>
</div>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide -mx-margin-mobile px-margin-mobile md:mx-0 md:px-0">
<button class="glass-card rounded-full px-4 py-2 font-body-md text-body-md text-primary border-primary/50 hud-glow whitespace-nowrap">Closest</button>
<button class="glass-card rounded-full px-4 py-2 font-body-md text-body-md text-on-surface-variant whitespace-nowrap hover:text-primary transition-colors">Highest</button>
<button class="glass-card rounded-full px-4 py-2 font-body-md text-body-md text-on-surface-variant whitespace-nowrap hover:text-primary transition-colors">Fastest</button>
<button class="glass-card rounded-full px-4 py-2 font-body-md text-body-md text-on-surface-variant whitespace-nowrap hover:text-primary transition-colors">Recent</button>
</div>
</section>
<!-- Aircraft List -->
<section class="space-y-3">
<!-- Card 1 -->
<article class="glass-card rounded-xl p-card-padding flex items-center gap-4 hover:border-primary/50 transition-colors cursor-pointer group">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high border border-glass-stroke flex items-center justify-center relative">
<span class="material-symbols-outlined text-primary" data-icon="flight" style="transform: rotate(45deg);">flight</span>
<!-- Direction Arrow -->
<div class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-surface-dim border border-glass-stroke flex items-center justify-center text-primary" style="transform: rotate(-30deg);">
<span class="material-symbols-outlined text-[12px]" data-icon="navigation">navigation</span>
</div>
</div>
<div class="flex-grow">
<div class="flex justify-between items-baseline mb-1">
<h3 class="font-data-lg text-data-lg text-text-high">UAL145</h3>
<span class="font-data-lg text-data-lg text-primary">4.2 mi</span>
</div>
<div class="flex gap-4 font-label-sm text-label-sm text-on-surface-variant">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">altitude</span>
                            34,000 ft
                        </div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">speed</span>
                            450 kts
                        </div>
</div>
</div>
</article>
<!-- Card 2 -->
<article class="glass-card rounded-xl p-card-padding flex items-center gap-4 hover:border-primary/50 transition-colors cursor-pointer group">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high border border-glass-stroke flex items-center justify-center relative">
<span class="material-symbols-outlined text-primary" data-icon="flight" style="transform: rotate(120deg);">flight</span>
<div class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-surface-dim border border-glass-stroke flex items-center justify-center text-primary" style="transform: rotate(45deg);">
<span class="material-symbols-outlined text-[12px]" data-icon="navigation">navigation</span>
</div>
</div>
<div class="flex-grow">
<div class="flex justify-between items-baseline mb-1">
<h3 class="font-data-lg text-data-lg text-text-high">DAL882</h3>
<span class="font-data-lg text-data-lg text-primary">8.7 mi</span>
</div>
<div class="flex gap-4 font-label-sm text-label-sm text-on-surface-variant">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">altitude</span>
                            28,500 ft
                        </div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">speed</span>
                            410 kts
                        </div>
</div>
</div>
</article>
<!-- Card 3 -->
<article class="glass-card rounded-xl p-card-padding flex items-center gap-4 hover:border-primary/50 transition-colors cursor-pointer group">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high border border-glass-stroke flex items-center justify-center relative">
<span class="material-symbols-outlined text-primary" data-icon="flight" style="transform: rotate(210deg);">flight</span>
<div class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-surface-dim border border-glass-stroke flex items-center justify-center text-primary" style="transform: rotate(180deg);">
<span class="material-symbols-outlined text-[12px]" data-icon="navigation">navigation</span>
</div>
</div>
<div class="flex-grow">
<div class="flex justify-between items-baseline mb-1">
<h3 class="font-data-lg text-data-lg text-text-high">AAL22</h3>
<span class="font-data-lg text-data-lg text-primary">12.1 mi</span>
</div>
<div class="flex gap-4 font-label-sm text-label-sm text-on-surface-variant">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">altitude</span>
                            36,000 ft
                        </div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">speed</span>
                            480 kts
                        </div>
</div>
</div>
</article>
</section>
<!-- Empty State (Hidden by default using standard tailwind hidden class, but keeping it visible for the prompt requirement demonstration. Usually would be toggled via JS based on data length) -->
<section class="hidden flex-col items-center justify-center py-16 text-center space-y-6">
<div class="relative w-48 h-48 rounded-full border border-glass-stroke bg-surface-container-high/30 overflow-hidden flex items-center justify-center">
<!-- Concentric rings -->
<div class="absolute inset-4 rounded-full border border-glass-stroke/50"></div>
<div class="absolute inset-10 rounded-full border border-glass-stroke/50"></div>
<!-- Radar Sweep -->
<div class="absolute inset-0 radar-sweep rounded-full"></div>
<!-- Center dot -->
<div class="w-2 h-2 bg-primary rounded-full z-10 shadow-[0_0_10px_#00dbe7]"></div>
</div>
<div class="space-y-2">
<p class="font-title-md text-title-md text-text-high">Searching airspace...</p>
<p class="font-body-md text-body-md text-on-surface-variant">Acquiring ADSB signals in your vicinity.</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-glass-surface backdrop-blur-xl border-t border-glass-stroke rounded-t-xl md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span class="font-label-sm text-label-sm">Map</span>
</button>
<button class="flex flex-col items-center justify-center text-primary filter drop-shadow-[0_0_8px_rgba(0,219,231,0.5)] hover:text-primary/80 transition-all active:scale-90 duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-label-sm text-label-sm">Nearby</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="local_airport">local_airport</span>
<span class="font-label-sm text-label-sm">Airports</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-label-sm text-label-sm">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200 w-16">
<span class="material-symbols-outlined mb-1" data-icon="bookmark">bookmark</span>
<span class="font-label-sm text-label-sm">Saved</span>
</button>
</nav>
<!-- Desktop Sidebar Placeholder (Hidden on mobile, showing intent for fluid grid layout rules) -->
<aside class="hidden md:flex fixed left-0 top-16 bottom-0 w-64 bg-glass-surface border-r border-glass-stroke backdrop-blur-xl flex-col py-6 px-4 gap-2 z-40">
<!-- Replicating nav items for desktop sidebar view -->
<button class="flex items-center gap-4 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-primary/10 transition-colors w-full text-left">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-title-md text-title-md">Map</span>
</button>
<button class="flex items-center gap-4 px-4 py-3 rounded-lg bg-primary/10 text-primary w-full text-left hud-glow">
<span class="material-symbols-outlined" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-title-md text-title-md">Nearby</span>
</button>
<!-- ... other items -->
</aside>
</body></html>
