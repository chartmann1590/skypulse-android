<style>
        body {
            background-color: #05070A;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 242, 255, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 255, 0.02), transparent 25%);
            color: #dee2f2;
        }
        
        .glass-card {
            background: rgba(20, 66, 114, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar for dark theme */

            width: 6px;
            height: 6px;

            background: #303541; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {

    body {
      min-height: max(884px, 100dvh);

<body class="antialiased min-h-screen flex flex-col pt-16 pb-24 md:pb-8">
<!-- TopAppBar -->
<header class="bg-glass-surface backdrop-blur-xl fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 border-b border-glass-stroke">
<button aria-label="Menu" class="text-on-surface-variant hover:bg-primary/10 transition-colors rounded-full p-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-display-lg text-primary tracking-tight">SkyPulse</h1>
<button aria-label="User profile" class="w-8 h-8 rounded-full bg-surface-container overflow-hidden border border-glass-stroke active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant leading-8 text-center w-full h-full" data-icon="account_circle">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col gap-6 p-margin-mobile md:px-margin-desktop max-w-7xl mx-auto w-full">
<!-- Page Title & Search -->
<section class="flex flex-col gap-4 mt-4">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-text-high">Airports</h2>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="search">search</span>
<input class="w-full bg-surface-container/50 border-0 border-b-2 border-glass-stroke focus:border-primary focus:ring-0 text-text-high font-body-md text-body-md py-4 pl-12 pr-4 transition-colors placeholder:text-on-surface-variant rounded-t-lg" placeholder="Search city, airport, IATA/ICAO" type="text"/>
</div>
</section>
<!-- Section 1: Airports Near You -->
<section class="flex flex-col gap-4 mt-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="my_location" data-weight="fill" style="font-variation-settings: 'FILL' 1;">my_location</span>
<h3 class="font-title-md text-title-md text-text-high">Airports Near You</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- KLAX Card -->
<div class="glass-card rounded-xl p-card-padding flex flex-col gap-4 relative overflow-hidden group">
<!-- Ambient glow -->
<div class="absolute -right-8 -top-8 w-32 h-32 bg-primary/10 rounded-full blur-2xl group-hover:bg-primary/20 transition-all duration-500"></div>
<div class="flex justify-between items-start z-10">
<div>
<div class="flex items-baseline gap-2">
<span class="font-data-lg text-data-lg text-primary tracking-wider">KLAX</span>
<span class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded-full border border-glass-stroke">12 mi</span>
</div>
<p class="font-body-md text-body-md text-on-surface mt-1">Los Angeles Intl</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="flight_takeoff">flight_takeoff</span>
</div>
<div class="mt-2 pt-4 border-t border-glass-stroke/50 flex justify-end z-10">
<button class="bg-primary text-pitch-black font-title-md text-title-md px-6 py-2 rounded-full hover:shadow-[0_0_12px_rgba(0,219,231,0.4)] active:scale-95 transition-all flex items-center gap-2">
                             View nearby aircraft
                             <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- KBUR Card -->
<div class="glass-card rounded-xl p-card-padding flex flex-col gap-4 relative overflow-hidden group">
<div class="absolute -right-8 -top-8 w-32 h-32 bg-secondary/10 rounded-full blur-2xl group-hover:bg-secondary/20 transition-all duration-500"></div>
<div class="flex justify-between items-start z-10">
<div>
<div class="flex items-baseline gap-2">
<span class="font-data-lg text-data-lg text-secondary tracking-wider">KBUR</span>
<span class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded-full border border-glass-stroke">18 mi</span>
</div>
<p class="font-body-md text-body-md text-on-surface mt-1">Hollywood Burbank</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="flight_takeoff">flight_takeoff</span>
</div>
<div class="mt-2 pt-4 border-t border-glass-stroke/50 flex justify-end z-10">
<button class="bg-transparent border border-glass-stroke text-primary font-title-md text-title-md px-6 py-2 rounded-full hover:bg-primary/5 hover:border-primary/30 active:scale-95 transition-all flex items-center gap-2">
                             View nearby aircraft
                             <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</section>
<!-- Section 2: Featured Airports (Bento Grid) -->
<section class="flex flex-col gap-4 mt-6">
<h3 class="font-title-md text-title-md text-text-high flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary-fixed text-sm" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
                Featured Airports
            </h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- LHR -->
<div class="glass-card rounded-xl p-card-padding flex flex-col justify-between aspect-square hover:-translate-y-1 hover:border-primary/30 transition-all cursor-pointer group">
<div class="flex justify-between items-start">
<span class="font-data-lg text-data-lg text-text-high group-hover:text-primary transition-colors">LHR</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm group-hover:text-primary transition-colors" data-icon="public">public</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface">London Heathrow</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">United Kingdom</p>
</div>
</div>
<!-- DXB -->
<div class="glass-card rounded-xl p-card-padding flex flex-col justify-between aspect-square hover:-translate-y-1 hover:border-primary/30 transition-all cursor-pointer group">
<div class="flex justify-between items-start">
<span class="font-data-lg text-data-lg text-text-high group-hover:text-primary transition-colors">DXB</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm group-hover:text-primary transition-colors" data-icon="public">public</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface">Dubai Intl</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">UAE</p>
</div>
</div>
<!-- HND -->
<div class="glass-card rounded-xl p-card-padding flex flex-col justify-between aspect-square hover:-translate-y-1 hover:border-primary/30 transition-all cursor-pointer group col-span-2 md:col-span-1">
<div class="flex justify-between items-start">
<span class="font-data-lg text-data-lg text-text-high group-hover:text-primary transition-colors">HND</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm group-hover:text-primary transition-colors" data-icon="public">public</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface">Tokyo Haneda</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Japan</p>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-glass-surface backdrop-blur-xl fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 rounded-t-xl border-t border-glass-stroke">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span class="font-label-sm text-label-sm">Map</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span class="font-label-sm text-label-sm">Nearby</span>
</button>
<!-- Active Tab: Airports -->
<button class="flex flex-col items-center justify-center text-primary filter drop-shadow-[0_0_8px_rgba(0,219,231,0.5)] hover:text-primary/80 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="local_airport" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_airport</span>
<span class="font-label-sm text-label-sm">Airports</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-label-sm text-label-sm">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="bookmark">bookmark</span>
<span class="font-label-sm text-label-sm">Saved</span>
</button>
</nav>
</body></html>
